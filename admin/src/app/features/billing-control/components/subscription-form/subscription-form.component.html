<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ planData ? "Edit" : "Create New" }} Plan</h2>
      <button class="btn-close" (click)="close.emit()">&times;</button>
    </div>

    <form [formGroup]="planForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <div class="form-group">
          <label>Plan Name</label>
          <input
            type="text"
            formControlName="name"
            placeholder="e.g. Pro Monthly"
          />
        </div>

        <div class="form-group">
          <label>Tier</label>
          <select formControlName="tier">
            <option value="FREE">FREE</option>
            <option value="PRO">PRO</option>
            <option value="UMKM">UMKM</option>
          </select>
        </div>

        <div class="form-group">
          <label>Price (IDR)</label>
          <input type="number" formControlName="price" />
        </div>

        <div class="form-group">
          <label>Duration (Days)</label>
          <input type="number" formControlName="duration_days" />
        </div>

        <div class="form-group full-width">
          <label>Features (JSON Format)</label>
          <textarea
            formControlName="features"
            rows="4"
            placeholder='["Unlimited Pockets", "Priority Support"]'
          ></textarea>
          <small>Must be a valid JSON array of strings.</small>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="close.emit()">
          Cancel
        </button>
        <button type="submit" class="btn-save" [disabled]="planForm.invalid">
          {{ planData ? "Update Plan" : "Create Plan" }}
        </button>
      </div>
    </form>
  </div>
</div>
