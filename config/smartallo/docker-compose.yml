version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartallo-postgres
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
    ports:
      - "5433:5432"
    volumes:
      - smartallo-data:/var/lib/postgresql/data
    networks:
      - smartallo-net

  api:
    image: masasensei/smartallo-api:latest
    container_name: smartallo-api
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - smartallo-net

  admin:
    image: masasensei/smartallo-admin:latest
    container_name: smartallo-admin
    restart: always
    ports:
      - "5173:80"
    networks:
      - smartallo-net

networks:
  smartallo-net:
    driver: bridge

volumes:
  smartallo-data:
