name: CI/CD Smartallo

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v3

      # 2. Login ke Docker Hub
      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build & push Go backend
      - name: Build & push backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/smartallo-api:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/smartallo-api:latest

      # 4. Build & push Angular Admin
      - name: Build & push admin
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/smartallo-admin:latest ./admin
          docker push ${{ secrets.DOCKER_USERNAME }}/smartallo-admin:latest

      # 5. Deploy ke VPS via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /config/smartallo
            docker compose pull
            export DB_HOST=postgres
            export DB_PORT=5432
            export DB_USER=${{ secrets.DB_USER }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export DB_NAME=${{ secrets.DB_NAME }}
            export DB_SSLMODE=disable
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            docker compose up -d
